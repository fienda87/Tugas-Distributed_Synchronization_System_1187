    build: { context: .., dockerfile: docker/Dockerfile.node }
    networks: [distnetv2]
    environment:
      <<: *auth_env
      ROLE: "cache"
      NODE_ID: "cache_b"
      HTTP_PORT: "9201"
      REDIS_URL: "redis://redis:6379/0"
      CLUSTER_PEERS: "http://cache_a:9200,http://cache_b:9201,http://cache_c:9202"
      CACHE_CAPACITY: "512"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "9201"]
    ports: ["9201:9201"]
    depends_on: { redis: { condition: service_healthy } }

  cache_c:
    build: { context: .., dockerfile: docker/Dockerfile.node }
    networks: [distnetv2]
    environment:
      <<: *auth_env
      ROLE: "cache"
      NODE_ID: "cache_c"
