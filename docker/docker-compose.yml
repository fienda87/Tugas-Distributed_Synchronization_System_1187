      ROLE: "queue"
      NODE_ID: "queue_c"
      HTTP_PORT: "9102"
      REDIS_URL: "redis://redis:6379/0"
      CLUSTER_PEERS: "http://queue_a:9100,http://queue_b:9101,http://queue_c:9102"
      QUEUE_REPLICA_FACTOR: "2"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "9102"]
    ports: ["9102:9102"]
    depends_on: { redis: { condition: service_healthy } }

  cache_a:
    build: { context: .., dockerfile: docker/Dockerfile.node }
    networks: [distnetv2]
    environment:
      <<: *auth_env
      ROLE: "cache"
      NODE_ID: "cache_a"
      HTTP_PORT: "9200"
      REDIS_URL: "redis://redis:6379/0"
      CLUSTER_PEERS: "http://cache_a:9200,http://cache_b:9201,http://cache_c:9202"
