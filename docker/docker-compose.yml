networks:
  distnetv2:
    driver: bridge

x-auth-env: &auth_env
  AUTH_ENABLED: "true"
  API_KEYS: "demo_admin:admin,demo_writer:writer,demo_reader:reader"
  INTERNAL_API_KEY: "demo_admin"
  INTER_NODE_ENC: "true"
  ENC_SHARED_KEY_BASE64: "2xQq0M0pB1jU1m8eY2QGhr0n6B7aB23ChzldnKmv3g0="

volumes:
  redis_v2:

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    networks: [distnetv2]
    volumes: [redis_v2:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 20
    restart: unless-stopped

  lock_a:
    build: { context: .., dockerfile: docker/Dockerfile.node }
    networks: [distnetv2]
    environment:
      <<: *auth_env
      ROLE: "lock"
      NODE_ID: "lock_a"
      HTTP_PORT: "9000"
      CLUSTER_NODES: "http://lock_a:9000,http://lock_b:9001,http://lock_c:9002"
      RAFT_ELECTION_MIN_MS: "1500"
      RAFT_ELECTION_MAX_MS: "3000"
      REDIS_URL: "redis://redis:6379/0"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "9000"]
    ports: ["9000:9000"]
    depends_on: { redis: { condition: service_healthy } }

  lock_b:
    build: { context: .., dockerfile: docker/Dockerfile.node }
    networks: [distnetv2]
    environment:
      <<: *auth_env
      ROLE: "lock"
      NODE_ID: "lock_b"
      HTTP_PORT: "9001"
      CLUSTER_NODES: "http://lock_a:9000,http://lock_b:9001,http://lock_c:9002"
      RAFT_ELECTION_MIN_MS: "1500"
      RAFT_ELECTION_MAX_MS: "3000"
      REDIS_URL: "redis://redis:6379/0"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "9001"]
    ports: ["9001:9001"]
    depends_on: { redis: { condition: service_healthy } }

  lock_c:
    build: { context: .., dockerfile: docker/Dockerfile.node }
    networks: [distnetv2]
    environment:
      <<: *auth_env
      ROLE: "lock"
      NODE_ID: "lock_c"
      HTTP_PORT: "9002"
      CLUSTER_NODES: "http://lock_a:9000,http://lock_b:9001,http://lock_c:9002"
      RAFT_ELECTION_MIN_MS: "1500"
      RAFT_ELECTION_MAX_MS: "3000"
      REDIS_URL: "redis://redis:6379/0"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "9002"]
    ports: ["9002:9002"]
    depends_on: { redis: { condition: service_healthy } }

  queue_a:
    build: { context: .., dockerfile: docker/Dockerfile.node }
    networks: [distnetv2]
    environment:
      <<: *auth_env
      ROLE: "queue"
      NODE_ID: "queue_a"
      HTTP_PORT: "9100"
      REDIS_URL: "redis://redis:6379/0"
      CLUSTER_PEERS: "http://queue_a:9100,http://queue_b:9101,http://queue_c:9102"
      QUEUE_REPLICA_FACTOR: "2"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "9100"]
    ports: ["9100:9100"]
    depends_on: { redis: { condition: service_healthy } }

  queue_b:
    build: { context: .., dockerfile: docker/Dockerfile.node }
    networks: [distnetv2]
