    networks: [distnetv2]
    environment:
      <<: *auth_env
      ROLE: "pbft"
      NODE_ID: "pbft_c"
      HTTP_PORT: "9402"
      CLUSTER_NODES: "http://pbft_a:9400,http://pbft_b:9401,http://pbft_c:9402"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "9402"]
    ports: ["9402:9402"]

  gateway:
    build: { context: .., dockerfile: docker/Dockerfile.node }
    networks: [distnetv2]
    environment:
      <<: *auth_env
      ROLE: "gateway"
      NODE_ID: "gateway"
      HTTP_PORT: "9300"
      REGION: "ap-south"
      REGION_MAP: "ap-south:220,eu-west:280,us-east:320"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "9300"]
    ports: ["9300:9300"]
    depends_on: { redis: { condition: service_healthy } }
