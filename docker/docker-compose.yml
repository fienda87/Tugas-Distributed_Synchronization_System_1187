      REDIS_URL: "redis://redis:6379/0"
      CLUSTER_PEERS: "http://cache_a:9200,http://cache_b:9201,http://cache_c:9202"
      CACHE_CAPACITY: "512"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "9202"]
    ports: ["9202:9202"]
    depends_on: { redis: { condition: service_healthy } }

  pbft_a:
    build: { context: .., dockerfile: docker/Dockerfile.node }
    networks: [distnetv2]
    environment:
      <<: *auth_env
      ROLE: "pbft"
      NODE_ID: "pbft_a"
      HTTP_PORT: "9400"
      CLUSTER_NODES: "http://pbft_a:9400,http://pbft_b:9401,http://pbft_c:9402"
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "9400"]
    ports: ["9400:9400"]

  pbft_b:
    build: { context: .., dockerfile: docker/Dockerfile.node }
    networks: [distnetv2]
